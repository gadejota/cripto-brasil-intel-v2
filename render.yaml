services:
  - type: web
    name: cripto-brasil-intel
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: CACHE_TTL_SECONDS
        value: 900
      - key: MAX_ARTICLES
        value: 36
      - key: ENVIRONMENT
        value: production
